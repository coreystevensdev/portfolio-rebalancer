name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.x

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release --warnaserror

      - name: Test
        run: dotnet test --no-build -c Release --verbosity normal
        env:
          # TestContainers pulls postgres:16-alpine -- Docker is available on ubuntu-latest.
          DOTNET_ENVIRONMENT: Test

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t portfolio-rebalancer:ci .

      - name: Smoke test
        run: |
          docker run -d --name smoke \
            -e ConnectionStrings__Postgres="Host=localhost;Database=noop;Username=noop;Password=noop" \
            -e JWT_SECRET="smoke-test-secret-key-at-least-32-chars" \
            -e ASPNETCORE_ENVIRONMENT=Production \
            -p 8080:8080 \
            portfolio-rebalancer:ci
          sleep 4
          curl -f http://localhost:8080/health || (docker logs smoke && exit 1)
          docker stop smoke
