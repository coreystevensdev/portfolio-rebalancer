name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.x

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release --warnaserror

      - name: Test
        run: dotnet test --no-build -c Release --verbosity normal
        env:
          # TestContainers pulls postgres:16-alpine -- Docker is available on ubuntu-latest.
          DOTNET_ENVIRONMENT: Test

  helm-lint:
    name: Helm Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.15.2

      - name: Lint chart
        run: helm lint infra/helm/portfolio-rebalancer

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: smoke
          POSTGRES_PASSWORD: smoke
          POSTGRES_DB: smoke
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t portfolio-rebalancer:ci .

      - name: Smoke test
        run: |
          docker run -d --name smoke \
            --network host \
            -e ConnectionStrings__Postgres="Host=localhost;Port=5432;Database=smoke;Username=smoke;Password=smoke" \
            -e JWT_SECRET="smoke-test-secret-key-at-least-32-chars" \
            -e ASPNETCORE_ENVIRONMENT=Production \
            portfolio-rebalancer:ci
          for i in $(seq 1 10); do
            if curl -sf http://localhost:8080/health; then
              docker stop smoke
              exit 0
            fi
            sleep 2
          done
          echo "server never became healthy"
          docker logs smoke
          docker stop smoke
          exit 1
