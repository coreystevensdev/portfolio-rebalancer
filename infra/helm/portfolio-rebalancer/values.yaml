replicaCount: 2

image:
  repository: ghcr.io/coreystevensdev/portfolio-rebalancer
  pullPolicy: IfNotPresent
  tag: ""

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
  hosts:
    - host: portfolio-rebalancer.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: portfolio-rebalancer-tls
      hosts:
        - portfolio-rebalancer.example.com

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70

livenessProbe:
  httpGet:
    path: /health
    port: 8080
  initialDelaySeconds: 15
  periodSeconds: 20

readinessProbe:
  httpGet:
    path: /health
    port: 8080
  initialDelaySeconds: 5
  periodSeconds: 10

env:
  ASPNETCORE_ENVIRONMENT: Production

# Secrets are expected to be pre-created in the namespace.
# Name of the Kubernetes Secret containing JWT_SECRET and ConnectionStrings__Postgres.
existingSecret: portfolio-rebalancer-secrets
