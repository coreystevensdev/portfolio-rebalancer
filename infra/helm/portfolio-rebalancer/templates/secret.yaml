{{- /*
This file is intentionally minimal. Secrets should be created out-of-band
(via kubectl, Sealed Secrets, or External Secrets Operator) and referenced
by name in values.yaml under `existingSecret`. Helm-managed secrets with
plaintext values are an anti-pattern for production.

If you need a development convenience secret for local cluster testing:

kubectl create secret generic portfolio-rebalancer-secrets \
  --from-literal=JWT_SECRET="<your-secret-at-least-32-chars>" \
  --from-literal="ConnectionStrings__Postgres"="Host=postgres;Database=rebalancer;Username=rebalancer;Password=<pw>"
*/ -}}
