services:
  api:
    build: .
    ports:
      - "8080:8080"
    environment:
      - ConnectionStrings__Postgres=Host=db;Port=5432;Database=portfolio_rebalancer;Username=portfolio;Password=${POSTGRES_PASSWORD:-changeme}
      - JWT_SECRET=${JWT_SECRET:-dev-secret-key-change-in-production-must-be-32-chars}
      - ASPNETCORE_ENVIRONMENT=Development
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: portfolio_rebalancer
      POSTGRES_USER: portfolio
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U portfolio -d portfolio_rebalancer"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
